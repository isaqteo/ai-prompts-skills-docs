name: Markdown Lint

on:
  pull_request:
    paths:
      - "**/*.md"
  push:
    branches: [main]
    paths:
      - "**/*.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run markdown lint
        run: python3 scripts/lint.py
